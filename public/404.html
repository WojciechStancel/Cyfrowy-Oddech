<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Cyfrowy Oddech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-[100dvh] flex flex-col items-center justify-center p-6 relative overflow-hidden select-none">
    
    <div class="absolute w-[500px] h-[500px] bg-emerald-500/5 blur-[120px] rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

    <div class="relative z-10 max-w-sm w-full text-center flex flex-col items-center animate-fade-in">
        
        <span class="text-[10px] sm:text-xs tracking-[0.4em] uppercase mb-4 opacity-40 font-bold block">
            Błąd połączenia
        </span>

        <h1 class="text-8xl sm:text-9xl font-extralight tabular-nums tracking-tighter leading-none mb-6 text-white">
            404
        </h1>

        <div class="w-24 h-1 bg-white/10 mb-8 rounded-full overflow-hidden">
            <div class="h-full w-1/3 bg-emerald-400/50 rounded-full"></div>
        </div>

        <p class="text-sm sm:text-base font-light text-slate-400 mb-12 leading-relaxed px-4">
            Ta ścieżka nie istnieje. Strona ulotniła się niczym chwila dekoncentracji w głębokim skupieniu.
        </p>

        <a href="/" class="inline-flex items-center justify-center bg-white text-slate-900 px-8 py-4 rounded-full font-medium tracking-wide shadow-2xl transition-all duration-300 hover:bg-slate-100 hover:scale-[1.02] active:scale-[0.98]">
            Wróć do skupienia
        </a>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</body>
</html>
